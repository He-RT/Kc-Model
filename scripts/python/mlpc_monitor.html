<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLPC 远程训练监控</title>
<style>
  :root {
    --bg: #050a14;
    --panel-bg: rgba(12, 20, 35, 0.7);
    --neon-cyan: #00f3ff;
    --neon-pink: #ff00ea;
    --neon-green: #39ff14;
    --neon-orange: #ff7300;
    --text-primary: #e0f2fe;
    --text-dim: #7dd3fc;
    --border-color: rgba(0, 243, 255, 0.3);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    background-color: var(--bg);
    background-image: 
      linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
    background-size: 20px 20px;
    color: var(--text-primary);
    font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
    min-height: 100vh;
    padding: 20px;
    display: flex;
    flex-direction: column;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    border-bottom: 2px solid var(--neon-cyan);
    padding-bottom: 10px;
    box-shadow: 0 4px 15px -10px var(--neon-cyan);
  }

  h1 {
    font-size: 24px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--neon-cyan);
    text-shadow: 0 0 5px var(--neon-cyan);
  }

  .meta-info {
    text-align: right;
    font-size: 12px;
    color: var(--text-dim);
  }

  .meta-info span { color: var(--neon-pink); }

  .dashboard {
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 24px;
    flex: 1;
  }

  @media (max-width: 850px) {
    .dashboard { grid-template-columns: 1fr; }
  }

  .panel {
    background: var(--panel-bg);
    border: 1px solid var(--border-color);
    border-radius: 4px;
    padding: 20px;
    position: relative;
    backdrop-filter: blur(5px);
    box-shadow: inset 0 0 20px rgba(0, 243, 255, 0.05);
  }

  .panel::before {
    content: '';
    position: absolute;
    top: -1px; left: -1px;
    width: 20px; height: 20px;
    border-top: 2px solid var(--neon-cyan);
    border-left: 2px solid var(--neon-cyan);
  }
  .panel::after {
    content: '';
    position: absolute;
    bottom: -1px; right: -1px;
    width: 20px; height: 20px;
    border-bottom: 2px solid var(--neon-cyan);
    border-right: 2px solid var(--neon-cyan);
  }

  .panel h2 {
    font-size: 14px;
    color: var(--neon-pink);
    margin-bottom: 16px;
    text-transform: uppercase;
    letter-spacing: 1px;
    border-bottom: 1px dotted var(--border-color);
    padding-bottom: 5px;
  }

  /* GPU Hero */
  .gpu-hero {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .gauge-container {
    position: relative;
    width: 220px;
    height: 220px;
    margin-bottom: 30px;
  }

  .gauge {
    width: 100%;
    height: 100%;
    transform: rotate(-90deg);
  }

  .gauge-bg {
    fill: none;
    stroke: rgba(0, 243, 255, 0.1);
    stroke-width: 12;
  }

  .gauge-val {
    fill: none;
    stroke: var(--neon-cyan);
    stroke-width: 12;
    stroke-dasharray: 502;
    stroke-dashoffset: 502;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.8s cubic-bezier(0.22, 1, 0.36, 1), stroke 0.5s;
    filter: drop-shadow(0 0 6px var(--neon-cyan));
  }

  .gauge-text {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
  }

  .gauge-text .perc {
    font-size: 42px;
    font-weight: bold;
    color: var(--text-primary);
    text-shadow: 0 0 10px rgba(255,255,255,0.3);
  }

  .gauge-text .label {
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    width: 100%;
  }

  /* Bars */
  .stat-group {
    margin-bottom: 15px;
  }
  
  .stat-header {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    margin-bottom: 6px;
  }

  .stat-val { color: var(--neon-cyan); font-weight: bold; }

  .bar-container {
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.1);
    height: 14px;
    border-radius: 2px;
    overflow: hidden;
    position: relative;
  }

  .bar-fill {
    height: 100%;
    width: 0%;
    transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1), background-color 0.5s;
    box-shadow: 0 0 8px currentColor;
  }

  .bar-mem { background-color: var(--neon-pink); color: var(--neon-pink); }
  .bar-temp { background-color: var(--neon-orange); color: var(--neon-orange); }

  /* Side Panel */
  .side-panel {
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .data-row {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    margin-bottom: 8px;
    padding-bottom: 4px;
    border-bottom: 1px dashed rgba(255,255,255,0.1);
  }
  .data-row:last-child { border-bottom: none; }
  .data-row .val { color: var(--neon-green); text-shadow: 0 0 4px rgba(57, 255, 20, 0.4); }

  .process-list {
    margin-top: 10px;
    max-height: 300px;
    overflow-y: auto;
  }
  
  /* Scrollbar */
  .process-list::-webkit-scrollbar { width: 4px; }
  .process-list::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); }
  .process-list::-webkit-scrollbar-thumb { background: var(--neon-cyan); }

  .proc-item {
    background: rgba(0, 243, 255, 0.05);
    border-left: 2px solid var(--neon-green);
    padding: 8px;
    margin-bottom: 8px;
    font-size: 11px;
    position: relative;
  }

  .proc-status {
    position: absolute;
    top: 8px; right: 8px;
    width: 6px; height: 6px;
    background: var(--neon-green);
    border-radius: 50%;
    box-shadow: 0 0 5px var(--neon-green);
    animation: blink 2s infinite;
  }

  .proc-cmd {
    color: var(--text-primary);
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    padding-right: 15px;
  }
  
  .proc-stats { color: var(--text-dim); }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  h1:hover {
    animation: glitch 0.2s linear infinite;
  }
  
  @keyframes glitch {
    0% { transform: translate(0) }
    20% { transform: translate(-2px, 2px) }
    40% { transform: translate(-2px, -2px) }
    60% { transform: translate(2px, 2px) }
    80% { transform: translate(2px, -2px) }
    100% { transform: translate(0) }
  }

</style>
</head>
<body>

<header>
  <h1>MLPC_SYS // 监控终端</h1>
  <div class="meta-info">
    <div>系统时间: <span id="time">--:--:--</span></div>
    <div>数据更新: <span id="countdown">2.0</span>s</div>
  </div>
</header>

<div class="dashboard">
  <div class="panel">
    <h2>🎮 GPU (RTX 5060) 核心状态</h2>
    
    <div class="gpu-hero">
      <div class="gauge-container">
        <svg class="gauge" viewBox="0 0 200 200">
          <circle class="gauge-bg" cx="100" cy="100" r="80"></circle>
          <circle class="gauge-val" id="gpu_gauge" cx="100" cy="100" r="80"></circle>
        </svg>
        <div class="gauge-text">
          <div class="perc" id="gpu_util">--%</div>
          <div class="label">利用率 UTIL</div>
        </div>
      </div>

      <div class="stats-grid">
        <div class="stat-group">
          <div class="stat-header">
            <span>显存池 VRAM</span>
            <span class="stat-val" id="gpu_mem">-- / --</span>
          </div>
          <div class="bar-container">
            <div class="bar-fill bar-mem" id="mem_bar"></div>
          </div>
        </div>
        
        <div class="stat-group">
          <div class="stat-header">
            <span>核心温度 TEMP</span>
            <span class="stat-val" id="gpu_temp">--°C</span>
          </div>
          <div class="bar-container">
            <div class="bar-fill bar-temp" id="temp_bar"></div>
          </div>
        </div>
        
        <div class="stat-group" style="grid-column: 1 / -1;">
          <div class="stat-header">
            <span>实时功耗 PWR</span>
            <span class="stat-val" id="gpu_power">-- W</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="side-panel">
    <div class="panel">
      <h2>🖥 系统资源 CPU & RAM</h2>
      <div class="data-row">
        <span>物理内存 TOTAL</span>
        <span class="val" id="ram_total">--</span>
      </div>
      <div class="data-row">
        <span>已分配 ALLOC</span>
        <span class="val" id="ram_used">--</span>
      </div>
      <div class="data-row">
        <span>可用资源 FREE</span>
        <span class="val" id="ram_free">--</span>
      </div>
    </div>

    <div class="panel" style="flex: 1;">
      <h2>⚙️ 训练进程拓扑 PROCS</h2>
      <div class="process-list" id="procs">
        <div class="proc-item" style="border-color: rgba(255,255,255,0.2)">
          <div class="proc-cmd">正在建立上行链路...</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const STATS_URL = 'http://192.168.1.118:8765/stats.json';
let lastUpdate = Date.now();
const refreshInterval = 2000;

function updateColor(val, element, isGauge = false) {
  let color = 'var(--neon-cyan)';
  if (val > 85) color = 'var(--neon-pink)';
  else if (val > 60) color = 'var(--neon-orange)';
  
  if (isGauge) {
    element.style.stroke = color;
    element.style.filter = `drop-shadow(0 0 6px ${color})`;
  } else {
    element.style.backgroundColor = color;
    element.style.color = color;
  }
}

async function refresh() {
  try {
    const r = await fetch(STATS_URL);
    const s = await r.json();
    
    lastUpdate = Date.now();
    document.getElementById('time').textContent = s.time;
    document.getElementById('time').style.color = 'var(--text-dim)';

    // RAM
    if (s.ram && s.ram.length >= 3) {
      document.getElementById('ram_total').textContent = s.ram[0];
      document.getElementById('ram_used').textContent = s.ram[1];
      document.getElementById('ram_free').textContent = s.ram[2];
    }

    // GPU
    if (s.gpu && typeof s.gpu === 'object') {
      const u = parseInt(s.gpu.util) || 0;
      document.getElementById('gpu_util').textContent = u + '%';
      
      const gauge = document.getElementById('gpu_gauge');
      const offset = 502 - (502 * u / 100);
      gauge.style.strokeDashoffset = offset;
      updateColor(u, gauge, true);

      const memParts = s.gpu.mem_used ? s.gpu.mem_used.split(' ') : ['0'];
      const memVal = parseInt(memParts[0]) || 0;
      const totalParts = s.gpu.mem_total ? s.gpu.mem_total.split(' ') : ['12288'];
      const totalVal = parseInt(totalParts[0]) || 12288;
      const memPct = Math.round(memVal / totalVal * 100);
      
      document.getElementById('gpu_mem').textContent = `${memVal} / ${totalVal} MiB (${memPct}%)`;
      const memBar = document.getElementById('mem_bar');
      memBar.style.width = memPct + '%';

      const temp = parseInt(s.gpu.temp) || 0;
      document.getElementById('gpu_temp').textContent = temp + '°C';
      const tempBar = document.getElementById('temp_bar');
      const tempPct = Math.min((temp / 100) * 100, 100);
      tempBar.style.width = tempPct + '%';
      updateColor(tempPct, tempBar, false);

      document.getElementById('gpu_power').textContent = (s.gpu.power || '--') + ' W';
    }

    // Processes
    const pc = document.getElementById('procs');
    if (s.processes && s.processes.length > 0) {
      pc.innerHTML = '';
      s.processes.forEach(p => {
        pc.innerHTML += `
          <div class="proc-item">
            <div class="proc-status"></div>
            <div class="proc-cmd">${p.cmd}</div>
            <div class="proc-stats">PID: ${p.pid} | CPU: ${p.cpu}% | MEM: ${p.mem}% | TIME: ${p.time}</div>
          </div>
        `;
      });
    } else {
      pc.innerHTML = `<div class="proc-item" style="border-color: rgba(255,255,255,0.2);"><div class="proc-cmd">暂无活动训练任务</div></div>`;
    }
  } catch(e) {
    document.getElementById('time').textContent = '连接中断 [OFFLINE]';
    document.getElementById('time').style.color = 'var(--neon-pink)';
  }
}

setInterval(() => {
  const now = Date.now();
  let diff = refreshInterval - (now - lastUpdate);
  if (diff < 0) diff = 0;
  document.getElementById('countdown').textContent = (diff / 1000).toFixed(1);
}, 100);

refresh();
setInterval(refresh, refreshInterval);
</script>
</body>
</html>
