<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLPC 远程训练监控</title>
<style>
  :root {
    --bg-color: #f9fafb;
    --card-bg: #ffffff;
    --text-main: #111827;
    --text-muted: #6b7280;
    --border-color: #e5e7eb;
    
    --color-green: #10b981;
    --color-yellow: #f59e0b;
    --color-red: #ef4444;
    --color-blue: #3b82f6;
    
    --radius: 16px;
    --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
    --shadow-hover: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
    
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    background-color: var(--bg-color);
    color: var(--text-main);
    min-height: 100vh;
    padding: 32px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    width: 100%;
    max-width: 1200px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border-color);
  }

  h1 {
    font-size: 20px;
    font-weight: 600;
    color: var(--text-main);
    letter-spacing: -0.5px;
  }

  .meta-info {
    text-align: right;
    font-size: 13px;
    color: var(--text-muted);
    display: flex;
    gap: 16px;
    align-items: center;
  }

  .meta-info span { 
    font-weight: 500; 
    color: var(--text-main);
    font-variant-numeric: tabular-nums;
  }

  .dashboard {
    display: grid;
    grid-template-columns: 1fr;
    gap: 24px;
  }

  @media (min-width: 900px) {
    .dashboard { grid-template-columns: 380px 1fr; }
  }

  .card {
    background: var(--card-bg);
    border: 1px solid var(--border-color);
    border-radius: var(--radius);
    padding: 24px;
    box-shadow: var(--shadow);
    transition: box-shadow 0.3s ease, transform 0.3s ease;
  }

  .card:hover {
    box-shadow: var(--shadow-hover);
    transform: translateY(-2px);
  }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
  }

  .card h2 {
    font-size: 16px;
    font-weight: 600;
    color: var(--text-main);
  }

  .status-indicator {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background-color: var(--color-green);
  }

  /* GPU Hero */
  .gpu-hero {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .gauge-container {
    position: relative;
    width: 200px;
    height: 200px;
    margin-bottom: 32px;
  }

  .gauge {
    width: 100%;
    height: 100%;
    transform: rotate(-90deg);
  }

  .gauge-bg {
    fill: none;
    stroke: var(--border-color);
    stroke-width: 14;
  }

  .gauge-val {
    fill: none;
    stroke: var(--color-blue);
    stroke-width: 14;
    stroke-dasharray: 502;
    stroke-dashoffset: 502;
    stroke-linecap: round;
    transition: stroke-dashoffset 1s cubic-bezier(0.22, 1, 0.36, 1), stroke 0.5s;
  }

  .gauge-text {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
  }

  .gauge-text .perc {
    font-size: 48px;
    font-weight: 700;
    color: var(--text-main);
    line-height: 1;
    letter-spacing: -1px;
    font-variant-numeric: tabular-nums;
  }

  .gauge-text .label {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 20px;
    width: 100%;
  }

  /* Bars */
  .stat-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  
  .stat-header {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
  }

  .stat-val { 
    color: var(--text-main); 
    font-weight: 600; 
    font-variant-numeric: tabular-nums;
  }

  .bar-container {
    background: #f3f4f6;
    height: 8px;
    border-radius: 4px;
    overflow: hidden;
    position: relative;
  }

  .bar-fill {
    height: 100%;
    width: 0%;
    border-radius: 4px;
    transition: width 1s cubic-bezier(0.22, 1, 0.36, 1), background-color 0.5s;
  }

  .bar-mem { background-color: var(--color-blue); }
  .bar-temp { background-color: var(--color-green); }

  /* Side Panel */
  .side-panel {
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .ram-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    text-align: center;
  }

  .ram-item {
    padding: 16px 8px;
    background: #f9fafb;
    border-radius: 12px;
    border: 1px solid var(--border-color);
  }

  .ram-label {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 4px;
    font-weight: 500;
  }

  .ram-val {
    font-size: 18px;
    font-weight: 600;
    color: var(--text-main);
    font-variant-numeric: tabular-nums;
  }

  /* Process Table */
  .table-container {
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    text-align: left;
    font-size: 13px;
  }

  th {
    padding: 12px 16px;
    font-weight: 500;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border-color);
    white-space: nowrap;
  }

  td {
    padding: 16px;
    color: var(--text-main);
    border-bottom: 1px solid #f3f4f6;
    font-variant-numeric: tabular-nums;
  }

  tr:last-child td {
    border-bottom: none;
  }

  .cmd-cell {
    max-width: 250px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    font-size: 12px;
    color: var(--text-muted);
  }

  .empty-state {
    padding: 32px;
    text-align: center;
    color: var(--text-muted);
    font-size: 14px;
    background: #f9fafb;
    border-radius: 12px;
    border: 1px dashed var(--border-color);
  }

  @keyframes pulse {
    0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
    70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
    100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
  }

  .dot.active {
    animation: pulse 2s infinite;
  }

</style>
</head>
<body>

<div class="container">
  <header>
    <h1>MLPC 训练监控</h1>
    <div class="meta-info">
      <div>更新: <span id="countdown">2.0</span>s</div>
      <div>系统时间: <span id="time">--:--:--</span></div>
    </div>
  </header>

  <div class="dashboard">
    <div class="card">
      <div class="card-header">
        <h2>GPU 核心状态 (RTX 5060)</h2>
        <div class="status-indicator">
          <div class="dot active" id="gpu_status_dot"></div>
          <span id="gpu_status_text">Online</span>
        </div>
      </div>
      
      <div class="gpu-hero">
        <div class="gauge-container">
          <svg class="gauge" viewBox="0 0 200 200">
            <circle class="gauge-bg" cx="100" cy="100" r="80"></circle>
            <circle class="gauge-val" id="gpu_gauge" cx="100" cy="100" r="80"></circle>
          </svg>
          <div class="gauge-text">
            <div class="perc" id="gpu_util">--<span style="font-size:24px">%</span></div>
            <div class="label">利用率</div>
          </div>
        </div>

        <div class="stats-grid">
          <div class="stat-group">
            <div class="stat-header">
              <span>显存使用率</span>
              <span class="stat-val" id="gpu_mem">-- / --</span>
            </div>
            <div class="bar-container">
              <div class="bar-fill bar-mem" id="mem_bar"></div>
            </div>
          </div>
          
          <div class="stat-group">
            <div class="stat-header">
              <span>核心温度</span>
              <span class="stat-val" id="gpu_temp">--°C</span>
            </div>
            <div class="bar-container">
              <div class="bar-fill bar-temp" id="temp_bar"></div>
            </div>
          </div>
          
          <div class="stat-group" style="margin-top: 8px; flex-direction: row; justify-content: space-between; align-items: center; border-top: 1px solid var(--border-color); padding-top: 16px;">
            <span class="stat-header" style="color: var(--text-main); font-weight: 500;">实时功耗</span>
            <span class="stat-val" style="font-size: 16px;" id="gpu_power">-- W</span>
          </div>
        </div>
      </div>
    </div>

    <div class="side-panel">
      <div class="card">
        <div class="card-header">
          <h2>系统资源</h2>
        </div>
        <div class="ram-grid">
          <div class="ram-item">
            <div class="ram-label">物理内存</div>
            <div class="ram-val" id="ram_total">--</div>
          </div>
          <div class="ram-item">
            <div class="ram-label">已分配</div>
            <div class="ram-val" id="ram_used">--</div>
          </div>
          <div class="ram-item">
            <div class="ram-label">可用资源</div>
            <div class="ram-val" id="ram_free">--</div>
          </div>
        </div>
      </div>

      <div class="card" style="flex: 1;">
        <div class="card-header">
          <h2>活动训练进程</h2>
        </div>
        <div class="table-container">
          <table id="procs_table">
            <thead>
              <tr>
                <th>PID</th>
                <th>命令</th>
                <th>CPU</th>
                <th>MEM</th>
                <th>运行时长</th>
              </tr>
            </thead>
            <tbody id="procs_body">
              <tr>
                <td colspan="5">
                  <div class="empty-state">正在建立上行链路...</div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const STATS_URL = 'http://192.168.1.118:8765/stats.json';
let lastUpdate = Date.now();
const refreshInterval = 2000;

function getColor(val) {
  if (val > 85) return 'var(--color-red)';
  if (val > 60) return 'var(--color-yellow)';
  return 'var(--color-blue)';
}

function getTempColor(val) {
  if (val > 80) return 'var(--color-red)';
  if (val > 65) return 'var(--color-yellow)';
  return 'var(--color-green)';
}

async function refresh() {
  try {
    const r = await fetch(STATS_URL);
    const s = await r.json();
    
    lastUpdate = Date.now();
    document.getElementById('time').textContent = s.time;
    
    const statusDot = document.getElementById('gpu_status_dot');
    const statusText = document.getElementById('gpu_status_text');
    statusDot.style.backgroundColor = 'var(--color-green)';
    statusDot.classList.add('active');
    statusText.textContent = 'Online';

    // RAM
    if (s.ram && s.ram.length >= 3) {
      document.getElementById('ram_total').textContent = s.ram[0];
      document.getElementById('ram_used').textContent = s.ram[1];
      document.getElementById('ram_free').textContent = s.ram[2];
    }

    // GPU
    if (s.gpu && typeof s.gpu === 'object') {
      const u = parseInt(s.gpu.util) || 0;
      document.getElementById('gpu_util').innerHTML = `${u}<span style="font-size:24px">%</span>`;
      
      const gauge = document.getElementById('gpu_gauge');
      const offset = 502 - (502 * u / 100);
      gauge.style.strokeDashoffset = offset;
      gauge.style.stroke = getColor(u);

      const memParts = s.gpu.mem_used ? s.gpu.mem_used.split(' ') : ['0'];
      const memVal = parseInt(memParts[0]) || 0;
      const totalParts = s.gpu.mem_total ? s.gpu.mem_total.split(' ') : ['12288'];
      const totalVal = parseInt(totalParts[0]) || 12288;
      const memPct = Math.round(memVal / totalVal * 100);
      
      document.getElementById('gpu_mem').textContent = `${memVal} / ${totalVal} MiB (${memPct}%)`;
      const memBar = document.getElementById('mem_bar');
      memBar.style.width = memPct + '%';
      memBar.style.backgroundColor = getColor(memPct);

      const temp = parseInt(s.gpu.temp) || 0;
      document.getElementById('gpu_temp').textContent = temp + '°C';
      const tempBar = document.getElementById('temp_bar');
      const tempPct = Math.min((temp / 100) * 100, 100);
      tempBar.style.width = tempPct + '%';
      tempBar.style.backgroundColor = getTempColor(temp);

      document.getElementById('gpu_power').textContent = (s.gpu.power || '--') + ' W';
    }

    // Processes
    const tbody = document.getElementById('procs_body');
    if (s.processes && s.processes.length > 0) {
      tbody.innerHTML = '';
      s.processes.forEach(p => {
        tbody.innerHTML += `
          <tr>
            <td>${p.pid}</td>
            <td class="cmd-cell" title="${p.cmd}">${p.cmd}</td>
            <td>${p.cpu}%</td>
            <td>${p.mem}%</td>
            <td>${p.time}</td>
          </tr>
        `;
      });
    } else {
      tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state">暂无活动训练任务</div></td></tr>`;
    }
  } catch(e) {
    document.getElementById('time').textContent = '--:--:--';
    const statusDot = document.getElementById('gpu_status_dot');
    const statusText = document.getElementById('gpu_status_text');
    statusDot.style.backgroundColor = 'var(--color-red)';
    statusDot.classList.remove('active');
    statusText.textContent = 'Offline';
  }
}

setInterval(() => {
  const now = Date.now();
  let diff = refreshInterval - (now - lastUpdate);
  if (diff < 0) diff = 0;
  document.getElementById('countdown').textContent = (diff / 1000).toFixed(1);
}, 100);

refresh();
setInterval(refresh, refreshInterval);
</script>
</body>
</html>
